<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BY DÉBORA JOIAS{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
        integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
        crossorigin="anonymous" referrerpolicy="no-referrer">


    <script src="/static/js/script.js"></script>

    <!-- Nosso CSS personalizado -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="d-flex flex-column min-vh-100">
    <!-- HEADER COM BARRA DE BUSCA -->
    <header class="header-simple">
        <div class="container">
            <div class="row align-items-center">
                <!-- LOGO À ESQUERDA -->
                <div class="col-md-4">
                    <div class="logo">
                        <h1>BY DÉBORA</h1>
                        <p class="subtitle">JOIAS</p>
                    </div>
                </div>

                <!-- BARRA DE BUSCA NO CENTRO -->
                <div class="col-md-4">
                    <div class="search-container">
                        <form action="{% url 'index' %}" method="GET" class="search-form">
                            <div class="input-group">
                                <input type="text" name="busca" class="form-control search-input"
                                    placeholder="Buscar produtos..." value="{{ busca|default:'' }}"
                                    aria-label="Buscar produtos">
                                <button class="btn btn-search" type="submit">
                                    🔍
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- MENU DE NAVEGAÇÃO À DIREITA -->
                <div class="col-md-4">
                    <div class="header-menu text-end">
                        <a href="{% url 'index' %}" class="btn btn-outline-secondary btn-sm me-2">Início</a>
                        <a href="{% url 'cart:home' %}" class="btn btn-outline-secondary btn-sm me-2"> {{request.session.cart_items }} <i class="fa-solid fa-cart-arrow-down"></i></a>
                        {% if user.is_authenticated %}
                        <a class="btn btn-outline-secondary btn-sm me-2" href="{% url 'logout' %}">Sair</a>
                        {% else %}
                        <a class="btn btn-outline-secondary btn-sm me-2" href="{% url 'register' %}">Registrar</a>
                        <a class="btn btn-outline-secondary btn-sm me-2" href="{% url 'login' %}">Entrar</a>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="flex-fill">
        {% block content %}
        <!-- Conteúdo das páginas filhas vai aqui -->
        {% endblock %}
    </main>
</body>
<!-- FOOTER SIMPLES -->
<footer class="footer-simple mt-auto">
    <div class="container">
        <p class="mb-0">&copy; 2024 BY DÉBORA JOIAS. Todos os direitos reservados.</p>
    </div>
</footer>

<!-- Bootstrap JavaScript -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">



</script>

</html>
